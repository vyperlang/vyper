name: Bytecode Size Report

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  bytecode-size:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merge commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          path: head
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Checkout base
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.base_ref }}
          path: base
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Copy scripts to base
        run: cp -r head/.github/scripts base/.github/

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install vyper (base)
        working-directory: base
        run: pip install .

      - name: Measure base bytecode sizes
        working-directory: base
        run: python .github/scripts/measure_bytecode.py > ../base-sizes.json

      - name: Install vyper (merge)
        working-directory: head
        run: pip install .

      - name: Measure merge bytecode sizes
        working-directory: head
        run: python .github/scripts/measure_bytecode.py > ../head-sizes.json

      - name: Generate report
        run: |
          python3 head/.github/scripts/compare_bytecode.py base-sizes.json head-sizes.json > report.md
          cat report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload size data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bytecode-size-report
          path: |
            base-sizes.json
            head-sizes.json
            report.md
