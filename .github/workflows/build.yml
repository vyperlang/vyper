name: Build artifacts

on:
  workflow_dispatch:
    inputs:
      tag:
        default: ''
  push:
    branches:
      - master
  pull_request:
  release:
    types: [published]  # releases and pre-releases (release candidates)

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  unix-build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          # the binary will not work for users with an older libc than what
          # is available on the ubuntu that the binary was built with.
          # therefore, use the oldest available ubuntu.
          - ubuntu-22.04
          - macos-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
            # grab the commit passed in via `tag`, if any
            ref: ${{ github.event.inputs.tag }}
            # need to fetch unshallow so that setuptools_scm can infer the version
            fetch-depth: 0
            persist-credentials: false

      # debug
      - name: Git shorthash
        run: git rev-parse --short HEAD

      - name: Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Generate Binary
        run: |
          pip install \
            --no-binary pycryptodome \
            --no-binary cbor2 \
            --no-binary immutables \
            . && \
          pip install pyinstaller && \
          make freeze


      - name: Upload Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: vyper-${{ runner.os }}
          path: dist/vyper.*

  windows-build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
            # grab the commit passed in via `tag`, if any
            ref: ${{ github.event.inputs.tag }}
            # need to fetch unshallow so that setuptools_scm can infer the version
            fetch-depth: 0
            persist-credentials: false

      # debug
      - name: Git shorthash
        run: git rev-parse --short HEAD

      - name: Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Generate Binary
        run: >-
          pip install . &&
          pip install pyinstaller &&
          ./make.cmd freeze

      - name: Upload Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: vyper-${{ runner.os }}
          path: dist/vyper.*

  publish-release-assets:
    needs: [windows-build, unix-build]
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    permissions:
      # Upload generated binaries to the GitHub release.
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Upload assets
        working-directory: artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          RELEASE_ID: ${{ github.event.release.id }}
        run: |
          set -Eeuo pipefail
          for BIN_NAME in $(ls)
          do
            curl -L \
              --no-progress-meter \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}"\
              -H "Content-Type: application/octet-stream" \
              "https://uploads.github.com/repos/${REPOSITORY}/releases/${RELEASE_ID}/assets?name=${BIN_NAME/+/%2B}" \
              --data-binary "@${BIN_NAME}"
          done

  # check build success for pull requests
  build-success:
    if: always()
    runs-on: ubuntu-latest
    needs: [windows-build, unix-build]
    permissions: {}
    steps:
      - name: check that all builds succeeded
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1
