version: 2

build:
  # TODO: update to `latest` once supported
  # https://github.com/readthedocs/readthedocs.org/issues/8861
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    pre_create_environment:
      - asdf plugin add uv
      - asdf install uv latest
      - asdf global uv latest
    create_environment:
      - uv venv "${READTHEDOCS_VIRTUALENV_PATH}"
    install:
      - UV_PROJECT_ENVIRONMENT="${READTHEDOCS_VIRTUALENV_PATH}" uv sync --frozen --no-dev --group docs

sphinx:
  configuration: docs/conf.py

# We can't use "all" because "htmlzip" format is broken for now
formats:
  - epub
  - pdf
